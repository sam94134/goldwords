<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>金句卡片產生器｜清醒行者</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;500&family=Noto+Sans+TC:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #f5f4f0;
    --card-bg: #ffffff;
    --text: #222222;
    --text-sub: #888888;
    --border: #e0e0e0;
    --accent: #1a1a1a;
    --tag-bg: #ffffff;
  }

  body {
    font-family: 'Noto Sans TC', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    color: var(--text);
  }

  /* HEADER */
  header {
    padding: 36px 40px 28px;
    border-bottom: 1px solid var(--border);
    background: #fff;
    display: flex;
    align-items: baseline;
    gap: 20px;
  }
  header h1 {
    font-family: 'Noto Serif TC', serif;
    font-size: 20px;
    font-weight: 400;
    letter-spacing: 5px;
    color: #333;
  }
  header span {
    font-size: 11px;
    letter-spacing: 3px;
    color: #bbb;
  }

  /* MAIN LAYOUT */
  .main {
    display: flex;
    gap: 0;
    min-height: calc(100vh - 89px);
  }

  /* LEFT PANEL */
  .panel {
    width: 320px;
    flex-shrink: 0;
    background: #fff;
    border-right: 1px solid var(--border);
    padding: 28px 24px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .field-label {
    font-size: 10px;
    letter-spacing: 3px;
    color: #aaa;
    margin-bottom: 8px;
    display: block;
    text-transform: uppercase;
  }

  .input-wrap input[type="text"] {
    width: 100%;
    padding: 12px 14px;
    border: 1px solid var(--border);
    background: var(--bg);
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 14px;
    color: var(--text);
    outline: none;
    letter-spacing: 1px;
    transition: border-color 0.2s;
  }
  .input-wrap input:focus { border-color: #999; background: #fff; }

  .gen-btn {
    width: 100%;
    padding: 14px;
    background: var(--accent);
    color: #fff;
    border: none;
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 12px;
    letter-spacing: 5px;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
  }
  .gen-btn:hover { background: #333; }
  .gen-btn:active { transform: scale(0.99); }

  .divider {
    border: none;
    border-top: 1px solid var(--border);
  }

  /* CONTROLS */
  .ctrl-row { display: flex; gap: 8px; }
  .ctrl-row .ctrl-group { flex: 1; }

  .toggle-btns { display: flex; gap: 5px; }
  .tbn {
    flex: 1;
    padding: 8px 4px;
    border: 1px solid var(--border);
    background: var(--bg);
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 11px;
    letter-spacing: 1px;
    color: #888;
    cursor: pointer;
    transition: all 0.15s;
  }
  .tbn.on { background: var(--accent); color: #fff; border-color: var(--accent); }

  .source-input {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid var(--border);
    background: var(--bg);
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 12px;
    color: #666;
    outline: none;
    letter-spacing: 2px;
  }
  .source-input:focus { border-color: #999; background: #fff; }

  /* QUICK TAGS */
  .quick-tags { display: flex; flex-wrap: wrap; gap: 6px; }
  .qtag {
    padding: 5px 10px;
    background: var(--bg);
    border: 1px solid var(--border);
    font-size: 11px;
    color: #666;
    cursor: pointer;
    letter-spacing: 1px;
    transition: all 0.15s;
  }
  .qtag:hover { background: #eee; border-color: #bbb; }

  .dl-all-btn {
    width: 100%;
    padding: 13px;
    background: #fff;
    color: #444;
    border: 1px solid var(--border);
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 11px;
    letter-spacing: 3px;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: auto;
  }
  .dl-all-btn:hover { background: var(--bg); border-color: #aaa; }

  /* RIGHT: CARDS GRID */
  .cards-area {
    flex: 1;
    padding: 32px;
    display: flex;
    flex-direction: column;
    gap: 24px;
  }

  .cards-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 16px;
  }

  .card-slot {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .card-num {
    font-size: 10px;
    letter-spacing: 3px;
    color: #ccc;
    text-align: center;
  }

  .canvas-wrap {
    position: relative;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .canvas-wrap:hover { transform: translateY(-3px); box-shadow: 0 12px 32px rgba(0,0,0,0.10); }

  .canvas-wrap canvas {
    display: block;
    width: 100%;
    height: auto;
    box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    background: #fff;
  }

  .card-actions {
    display: flex;
    gap: 6px;
  }

  .edit-btn, .dl-btn {
    flex: 1;
    padding: 7px 4px;
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 10px;
    letter-spacing: 1px;
    cursor: pointer;
    border: 1px solid var(--border);
    transition: all 0.15s;
  }
  .edit-btn { background: #fff; color: #666; }
  .edit-btn:hover { background: var(--bg); }
  .dl-btn { background: var(--accent); color: #fff; border-color: var(--accent); }
  .dl-btn:hover { background: #333; }

  /* EDIT MODAL */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
  }
  .modal-overlay.show { opacity: 1; pointer-events: all; }

  .modal {
    background: #fff;
    width: 360px;
    padding: 28px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.15);
  }
  .modal h3 {
    font-family: 'Noto Serif TC', serif;
    font-size: 15px;
    font-weight: 400;
    letter-spacing: 3px;
    color: #444;
  }
  .modal textarea {
    width: 100%;
    padding: 12px 14px;
    border: 1px solid var(--border);
    font-family: 'Noto Serif TC', serif;
    font-size: 15px;
    color: #333;
    line-height: 1.8;
    resize: vertical;
    min-height: 100px;
    outline: none;
    letter-spacing: 1px;
    background: var(--bg);
  }
  .modal textarea:focus { border-color: #999; background: #fff; }
  .modal-btns { display: flex; gap: 8px; }
  .modal-save {
    flex: 1;
    padding: 12px;
    background: var(--accent);
    color: #fff;
    border: none;
    font-size: 12px;
    letter-spacing: 3px;
    cursor: pointer;
  }
  .modal-cancel {
    padding: 12px 16px;
    background: #fff;
    color: #666;
    border: 1px solid var(--border);
    font-size: 12px;
    letter-spacing: 2px;
    cursor: pointer;
  }

  /* EMPTY STATE */
  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 400px;
    gap: 16px;
    color: #ccc;
  }
  .empty-state .big { font-family: 'Noto Serif TC', serif; font-size: 48px; }
  .empty-state p { font-size: 13px; letter-spacing: 3px; }

  /* LIGHTBOX */
  .lightbox {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 200;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s;
    padding: 24px;
  }
  .lightbox.show { opacity: 1; pointer-events: all; }

  .lightbox-inner {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    max-height: 90vh;
  }

  .lightbox-inner img {
    max-height: 78vh;
    max-width: 90vw;
    width: auto;
    display: block;
    box-shadow: 0 24px 80px rgba(0,0,0,0.5);
  }

  .lightbox-actions {
    display: flex;
    gap: 10px;
  }

  .lb-dl-btn {
    padding: 12px 28px;
    background: #fff;
    color: #222;
    border: none;
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 12px;
    letter-spacing: 3px;
    cursor: pointer;
    transition: background 0.15s;
  }
  .lb-dl-btn:hover { background: #eee; }

  .lb-edit-btn {
    padding: 12px 28px;
    background: transparent;
    color: #fff;
    border: 1px solid rgba(255,255,255,0.4);
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 12px;
    letter-spacing: 3px;
    cursor: pointer;
    transition: border-color 0.15s;
  }
  .lb-edit-btn:hover { border-color: #fff; }

  .lb-close {
    position: absolute;
    top: -16px;
    right: -16px;
    width: 36px;
    height: 36px;
    background: rgba(255,255,255,0.15);
    border: none;
    color: #fff;
    font-size: 18px;
    cursor: pointer;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s;
  }
  .lb-close:hover { background: rgba(255,255,255,0.3); }

  .lb-nav {
    position: fixed;
    top: 50%;
    transform: translateY(-50%);
    width: 44px;
    height: 44px;
    background: rgba(255,255,255,0.15);
    border: none;
    color: #fff;
    font-size: 20px;
    cursor: pointer;
    border-radius: 50%;
    transition: background 0.15s;
    z-index: 201;
  }
  .lb-nav:hover { background: rgba(255,255,255,0.3); }
  .lb-prev { left: 20px; }
  .lb-next { right: 20px; }

  .lb-counter {
    font-size: 11px;
    letter-spacing: 3px;
    color: rgba(255,255,255,0.5);
  }

  .canvas-wrap { cursor: zoom-in; }

  /* SOURCE TOGGLE */
  .source-toggle {
    display: flex;
    gap: 0;
    border: 1px solid var(--border);
    overflow: hidden;
  }
  .src-btn {
    flex: 1;
    padding: 11px 8px;
    border: none;
    background: var(--bg);
    font-family: 'Noto Serif TC', serif;
    font-size: 13px;
    letter-spacing: 2px;
    color: #888;
    cursor: pointer;
    transition: all 0.15s;
  }
  .src-btn.on {
    background: var(--accent);
    color: #fff;
  }
  .src-btn:not(:last-child) {
    border-right: 1px solid var(--border);
  }

  /* STORY MODE */
  .mode-toggle {
    display: flex;
    gap: 0;
    border: 1px solid var(--border);
    overflow: hidden;
    margin-top: 8px;
  }
  .mode-btn {
    flex: 1;
    padding: 10px 6px;
    border: none;
    background: var(--bg);
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 11px;
    letter-spacing: 1px;
    color: #888;
    cursor: pointer;
    transition: all 0.15s;
    line-height: 1.4;
  }
  .mode-btn.on {
    background: #333;
    color: #fff;
  }
  .mode-btn:not(:last-child) {
    border-right: 1px solid var(--border);
  }

  .story-input-wrap {
    display: none;
  }
  .story-input-wrap.show {
    display: block;
  }
  .story-input-wrap textarea {
    width: 100%;
    padding: 12px 14px;
    border: 1px solid var(--border);
    background: var(--bg);
    font-family: 'Noto Serif TC', serif;
    font-size: 14px;
    color: #333;
    line-height: 1.8;
    resize: vertical;
    min-height: 80px;
    outline: none;
    letter-spacing: 1px;
  }
  .story-input-wrap textarea:focus {
    border-color: #999;
    background: #fff;
  }

  .kw-wrap { display: block; }
  .kw-wrap.hide { display: none; }

  .gen-status {
    font-size: 11px;
    letter-spacing: 2px;
    color: #aaa;
    text-align: center;
    min-height: 14px;
  }

  @media (max-width: 900px) {
    .main { flex-direction: column; }
    .panel { width: 100%; border-right: none; border-bottom: 1px solid var(--border); }
    .cards-grid { grid-template-columns: repeat(2, 1fr); }
    header { padding: 20px; }
    .cards-area { padding: 20px; }
  }
</style>
</head>
<body>

<header>
  <h1>金句卡片產生器</h1>
  <span>人生卡關，翻書看看</span>
</header>

<div class="main">
  <!-- LEFT PANEL -->
  <div class="panel">

    <div>
      <span class="field-label">來源</span>
      <div class="source-toggle">
        <button class="src-btn on" onclick="setSource('bible', this)">聖　經</button>
        <button class="src-btn" onclick="setSource('diamond', this)">金剛經</button>
      </div>
    </div>

    <div>
      <span class="field-label">模式</span>
      <div class="mode-toggle">
        <button class="mode-btn on" onclick="setMode('quote', this)">金句卡片</button>
        <button class="mode-btn" onclick="setMode('story', this)">生活故事<br><span style="font-size:10px;opacity:0.7">金剛經限定</span></button>
      </div>
    </div>

    <!-- 金句模式 -->
    <div class="kw-wrap" id="kwWrap">
      <div class="input-wrap">
        <span class="field-label">輸入關鍵字或主題</span>
        <input type="text" id="kw" placeholder="例：不被選擇、感情、卡關…" />
      </div>
      <button class="gen-btn" onclick="generateAll()">生成五張金句卡片</button>
    </div>

    <!-- 故事模式 -->
    <div class="story-input-wrap" id="storyWrap">
      <span class="field-label">輸入一句金剛經金句</span>
      <textarea id="storyQuote" placeholder="例：應無所住，而生其心。&#10;&#10;或從下方快速選擇"></textarea>
      <hr class="divider" style="margin:12px 0">
      <span class="field-label">或貼入 JSON 直接生成</span>
      <textarea id="storyJson" placeholder='{"slides":[{"text":"..."},{"text":"..."},{"text":"..."},{"text":"..."},{"text":"..."}]}' style="min-height:100px;font-size:11px;font-family:monospace;letter-spacing:0"></textarea>
      <button class="gen-btn" style="margin-top:10px" onclick="generateStory()">生成五張生活故事</button>
    </div>

    <div class="gen-status" id="genStatus"></div>

    <hr class="divider">

    <div>
      <span class="field-label">署名</span>
      <input type="text" class="source-input" id="srcInput" value="清醒行者" oninput="redrawAll()">
    </div>

    <div class="ctrl-row">
      <div class="ctrl-group">
        <span class="field-label">文字大小</span>
        <div class="toggle-btns" id="szBtns">
          <button class="tbn" onclick="setSz('s',this)">小</button>
          <button class="tbn on" onclick="setSz('m',this)">中</button>
          <button class="tbn" onclick="setSz('l',this)">大</button>
        </div>
      </div>
      <div class="ctrl-group">
        <span class="field-label">對齊方式</span>
        <div class="toggle-btns" id="alBtns">
          <button class="tbn on" onclick="setAl('left',this)">左</button>
          <button class="tbn" onclick="setAl('center',this)">中</button>
        </div>
      </div>
    </div>

    <hr class="divider">

    <div>
      <span class="field-label">快速主題</span>
      <div class="quick-tags" id="quickTags"></div>
    </div>

    <button class="dl-all-btn" onclick="downloadAll()">全部下載（五張）</button>

  </div>

  <!-- CARDS AREA -->
  <div class="cards-area">
    <div class="cards-grid" id="cardsGrid">
      <!-- empty state -->
      <div class="empty-state" style="grid-column:1/-1">
        <div class="big">翻</div>
        <p>輸入關鍵字，生成五張金句卡片</p>
      </div>
    </div>
  </div>
</div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox" onclick="closeLightbox(event)">
  <button class="lb-nav lb-prev" onclick="lbNav(-1);event.stopPropagation()">&#8249;</button>
  <button class="lb-nav lb-next" onclick="lbNav(1);event.stopPropagation()">&#8250;</button>
  <div class="lightbox-inner" onclick="event.stopPropagation()">
    <button class="lb-close" onclick="closeLightboxDirect()">&#215;</button>
    <img id="lbImg" src="" alt="">
    <div class="lb-counter" id="lbCounter">1 / 5</div>
    <div class="lightbox-actions">
      <button class="lb-dl-btn" onclick="lbDownload()">下載這張</button>
      <button class="lb-edit-btn" onclick="lbEdit()">編輯文字</button>
    </div>
  </div>
</div>

<!-- EDIT MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <h3>編輯金句</h3>
    <textarea id="modalText" rows="4"></textarea>
    <div class="modal-btns">
      <button class="modal-save" onclick="saveModal()">確認</button>
      <button class="modal-cancel" onclick="closeModalDirect()">取消</button>
    </div>
  </div>
</div>

<script>
// ─── STATE ───────────────────────────────────────────
var sz = 'm';
var al = 'left';
var quotes = ['','','','',''];
var editIdx = -1;

var fontSizes = { s: 40, m: 52, l: 66 };
var OUT_W = 1080, OUT_H = 1350;

// ─── QUOTE BANK ──────────────────────────────────────
// 每筆格式：{ text, ref }
var allQuotes = [
  // 不被選擇 [0-4]
  { text: '神看人不像人看人。\n人看外表，神看內心。', ref: '撒母耳記上 16:7' },
  { text: '你不需要先變好，\n才值得被愛。', ref: '路加福音 15:20' },
  { text: '大衛連父親都忘了叫他，\n但神沒有忘記他。', ref: '撒母耳記上 16:11-12' },
  { text: '沒有人要你的時候，\n神還是在那裡。', ref: '創世記 21:17' },
  { text: '不被選擇，\n不代表你沒有位置。', ref: '創世記 29:31' },
  // 自信 [5-9]
  { text: '我靠著那加給我力量的，\n凡事都能做。', ref: '腓立比書 4:13' },
  { text: '神揀選的標準，\n從來不是你有多厲害。', ref: '出埃及記 4:10-12' },
  { text: '我在你母腹中造你之前，\n已經認識你了。', ref: '耶利米書 1:5' },
  { text: '你不確定自己，\n但神從一開始就確定你。', ref: '士師記 6:15-16' },
  { text: '神不需要你先準備好，\n才對你說話。', ref: '撒母耳記上 3:8-10' },
  // 迷失 [10-14]
  { text: '你往哪裡去，\n我也往那裡去。', ref: '路得記 1:16' },
  { text: '迷失不是終點，\n回頭永遠來得及。', ref: '路加福音 15:20' },
  { text: '約拿以為在逃，\n其實只是繞了一圈。', ref: '約拿書 1-2章' },
  { text: '浪子回頭那一刻，\n父親遠遠就跑來迎接他。', ref: '路加福音 15:20' },
  { text: '以利亞逃到曠野，\n神差天使來餵他吃東西。', ref: '列王記上 19:5-8' },
  // 感情 [15-19]
  { text: '愛是不求自己的益處，\n不輕易發怒。', ref: '哥林多前書 13:5' },
  { text: '那七年在他看來，\n不過是幾天。', ref: '創世記 29:20' },
  { text: '兩個完整的人相遇，\n才叫做愛情。', ref: '創世記 2:19-22' },
  { text: '要愛鄰舍，\n如同愛自己。', ref: '馬可福音 12:31' },
  { text: '在一起了卻更孤單，\n不是你的錯。', ref: '創世記 25:22' },
  // 卡關 [20-24]
  { text: '起來吃吧，\n因為你當走的路甚遠。', ref: '列王記上 19:7' },
  { text: '你們中間為大的，\n要作你們的用人。', ref: '馬太福音 23:11' },
  { text: '走投無路的時候，\n出路往往從意想不到的地方來。', ref: '列王記下 4:1-7' },
  { text: '卡關是一個信號，\n不是句點。', ref: '約拿書 2:1' },
  { text: '神的意思是好的，\n就算人的意思是要害你。', ref: '創世記 50:20' },
  // 失敗 [25-29]
  { text: '彼得三次否認耶穌，\n耶穌復活後親自去恢復他。', ref: '約翰福音 21:15' },

function setSource(src, el) {
  currentSource = src;
  document.querySelectorAll('.src-btn').forEach(function(b){ b.classList.remove('on'); });
  el.classList.add('on');
  document.getElementById('kw').value = '';
  renderQuickTags();
}

function renderQuickTags() {
  var tags = currentSource === 'bible' ? bibleTags : diamondTags;
  var container = document.getElementById('quickTags');
  container.innerHTML = '';
  tags.forEach(function(t) {
    var span = document.createElement('span');
    span.className = 'qtag';
    span.textContent = t.label;
    span.onclick = function(){
      if (currentMode === 'story') {
        // in story mode, find a matching quote and fill textarea
        var kmap = diamondKeywordMap;
        var bank = diamondQuotes;
        var keys = Object.keys(kmap);
        var matched = null;
        for (var i = 0; i < keys.length; i++) {
          if (t.kw.indexOf(keys[i]) >= 0 || keys[i].indexOf(t.kw) >= 0) {
            var pool = kmap[keys[i]];
            var q = bank[pool[Math.floor(Math.random() * pool.length)]];
            matched = q.text.replace(/\n/g, '') + (q.ref ? '（' + q.ref + '）' : '');
            break;
          }
        }
        if (!matched) {
          var q = bank[Math.floor(Math.random() * bank.length)];
          matched = q.text.replace(/\n/g, '') + (q.ref ? '（' + q.ref + '）' : '');
        }
        document.getElementById('storyQuote').value = matched;
      } else {
        setKwGen(t.kw);
      }
    };
    container.appendChild(span);
  });
}

function generateStory() {
  var jsonInput = document.getElementById('storyJson').value.trim();

  if (jsonInput) {
    try {
      jsonInput = jsonInput.replace(/```json|```/g, '').trim();
      var parsed = JSON.parse(jsonInput);
      if (!parsed.slides || parsed.slides.length === 0) {
        document.getElementById('genStatus').textContent = 'JSON 格式不對，請重新貼入';
        return;
      }
      quotes = parsed.slides.map(function(s) {
        return { text: s.text || '', ref: s.ref || '' };
      });
      renderGrid();
      document.getElementById('genStatus').textContent = '生成完成';
      document.getElementById('storyJson').value = '';
    } catch(e) {
      document.getElementById('genStatus').textContent = 'JSON 格式錯誤，請重新貼入';
    }
    return;
  }

  document.getElementById('genStatus').textContent = '請貼入 JSON 文案';
}

// ─── GENERATE ────────────────────────────────────────
function generateAll() {
  var kw = document.getElementById('kw').value.trim();
  var bank = currentSource === 'bible' ? allQuotes : diamondQuotes;
  var kmap = currentSource === 'bible' ? keywordMap : diamondKeywordMap;
  var pool = null;

  if (kw) {
    var keys = Object.keys(kmap);
    for (var i = 0; i < keys.length; i++) {
      if (kw.indexOf(keys[i]) >= 0 || keys[i].indexOf(kw) >= 0) {
        pool = kmap[keys[i]].map(function(idx){ return bank[idx]; });
        break;
      }
    }
  }

  if (!pool) {
    var shuffled = bank.slice().sort(function(){ return Math.random()-0.5; });
    pool = shuffled.slice(0, 5);
  } else {
    pool = pool.slice().sort(function(){ return Math.random()-0.5; });
  }

  quotes = pool.slice(0, 5);
  renderGrid();
}

// ─── RENDER GRID ─────────────────────────────────────
function renderGrid() {
  var grid = document.getElementById('cardsGrid');
  grid.innerHTML = '';

  for (var i = 0; i < 5; i++) {
    var slot = document.createElement('div');
    slot.className = 'card-slot';
    slot.innerHTML =
      '<div class="card-num">' + (i+1) + ' / 5</div>' +
      '<div class="canvas-wrap" id="wrap' + i + '" onclick="openLightbox(' + i + ')">' +
        '<canvas id="cv' + i + '" width="1080" height="1350"></canvas>' +
      '</div>' +
      '<div class="card-actions">' +
        '<button class="edit-btn" onclick="openModal(' + i + ')">編輯</button>' +
        '<button class="dl-btn" onclick="downloadOne(' + i + ')">下載</button>' +
      '</div>';
    grid.appendChild(slot);
    paintCard(i);
  }
}

function redrawAll() {
  if (quotes[0] === '') return;
  for (var i = 0; i < 5; i++) paintCard(i);
}

// ─── PAINT ───────────────────────────────────────────
function paintCard(idx) {
  var cv = document.getElementById('cv' + idx);
  if (!cv) return;
  var src = document.getElementById('srcInput').value || '';
  var q = quotes[idx] || { text: '', ref: '' };
  paint(cv, OUT_W, OUT_H, q.text, q.ref, src);
  var lb = document.getElementById('lightbox');
  if (lb.classList.contains('show') && lbIdx === idx) updateLightbox();
}

function paint(cv, w, h, text, ref, src) {
  var ctx = cv.getContext('2d');
  cv.width = w; cv.height = h;
  var scale = w / 1080;
  var f = Math.round(fontSizes[sz] * scale);
  var pad = Math.round(w * 0.12);

  // background
  ctx.fillStyle = '#0f0f0f';
  ctx.fillRect(0, 0, w, h);

  // border
  ctx.strokeStyle = '#2a2a2a';
  ctx.lineWidth = Math.max(0.5, scale);
  ctx.strokeRect(0.5, 0.5, w-1, h-1);

  // quote text — centered in upper 65% of card
  ctx.fillStyle = '#f0ebe0';
  ctx.font = '400 ' + f + 'px "Noto Serif TC", serif';
  ctx.textBaseline = 'alphabetic';

  var lines = text.split('\n');
  var lh = f * 2.0;
  var totalH = (lines.length - 1) * lh + f;
  var zone = h * 0.65;
  var startY = (zone - totalH) / 2 + f;

  for (var i = 0; i < lines.length; i++) {
    var y = startY + i * lh;
    if (al === 'left') {
      ctx.textAlign = 'left';
      ctx.fillText(lines[i], pad, y);
    } else {
      ctx.textAlign = 'center';
      ctx.fillText(lines[i], w/2, y);
    }
  }

  // ref — below quote
  if (ref) {
    var rs = Math.round(f * 0.38);
    ctx.font = '300 ' + rs + 'px "Noto Sans TC", sans-serif';
    ctx.fillStyle = '#666666';
    var refY = startY + lines.length * lh + Math.round(f * 0.6);
    if (al === 'left') {
      ctx.textAlign = 'left';
      ctx.fillText('— ' + ref, pad, refY);
    } else {
      ctx.textAlign = 'center';
      ctx.fillText('— ' + ref, w/2, refY);
    }
  }

  // source — bottom right
  var ss = Math.round(f * 0.88);
  ctx.font = '300 ' + ss + 'px "Noto Sans TC", sans-serif';
  ctx.fillStyle = '#444444';
  ctx.textAlign = 'right';
  ctx.textBaseline = 'alphabetic';
  ctx.fillText(src, w - pad * 0.6, h - pad * 0.5);
}

// ─── DOWNLOAD ────────────────────────────────────────
function downloadOne(idx) {
  var off = document.createElement('canvas');
  var src = document.getElementById('srcInput').value || '';
  var q = quotes[idx] || { text: '', ref: '' };
  paint(off, OUT_W, OUT_H, q.text, q.ref, src);
  var a = document.createElement('a');
  var slug = q.text.replace(/\n/g,'').substring(0,10);
  a.download = '金句_' + (idx+1) + '_' + slug + '.png';
  a.href = off.toDataURL('image/png');
  a.click();
}

function downloadAll() {
  if (!quotes[0]) { alert('請先生成金句卡片'); return; }
  var src = document.getElementById('srcInput').value || '';
  for (var i = 0; i < 5; i++) {
    (function(idx){
      setTimeout(function(){
        var off = document.createElement('canvas');
        var q = quotes[idx] || { text: '', ref: '' };
        paint(off, OUT_W, OUT_H, q.text, q.ref, src);
        var a = document.createElement('a');
        var slug = q.text.replace(/\n/g,'').substring(0,10);
        a.download = '金句_' + (idx+1) + '_' + slug + '.png';
        a.href = off.toDataURL('image/png');
        a.click();
      }, idx * 400);
    })(i);
  }
}

// ─── EDIT MODAL ──────────────────────────────────────
function openModal(idx) {
  editIdx = idx;
  document.getElementById('modalText').value = quotes[idx] ? quotes[idx].text : '';
  document.getElementById('modalOverlay').classList.add('show');
}

function saveModal() {
  if (quotes[editIdx]) {
    quotes[editIdx].text = document.getElementById('modalText').value;
  }
  paintCard(editIdx);
  closeModalDirect();
}

// ─── LIGHTBOX ────────────────────────────────────────
var lbIdx = 0;

function openLightbox(idx) {
  lbIdx = idx;
  updateLightbox();
  document.getElementById('lightbox').classList.add('show');
}

function updateLightbox() {
  var cv = document.getElementById('cv' + lbIdx);
  if (!cv) return;
  document.getElementById('lbImg').src = cv.toDataURL('image/png');
  document.getElementById('lbCounter').textContent = (lbIdx + 1) + ' / 5';
}

function lbNav(dir) {
  lbIdx = (lbIdx + dir + 5) % 5;
  updateLightbox();
}

function closeLightbox(e) {
  document.getElementById('lightbox').classList.remove('show');
}
function closeLightboxDirect() {
  document.getElementById('lightbox').classList.remove('show');
}

function lbDownload() { downloadOne(lbIdx); }
function lbEdit() {
  closeLightboxDirect();
  openModal(lbIdx);
}

// keyboard nav
document.addEventListener('keydown', function(e) {
  var lb = document.getElementById('lightbox');
  if (!lb.classList.contains('show')) return;
  if (e.key === 'ArrowLeft') lbNav(-1);
  if (e.key === 'ArrowRight') lbNav(1);
  if (e.key === 'Escape') closeLightboxDirect();
});

// ─── FONTS READY ─────────────────────────────────────
document.fonts.ready.then(function(){ renderQuickTags(); redrawAll(); });
setTimeout(function(){ renderQuickTags(); redrawAll(); }, 1000);
</script>
</body>
