<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>金句卡片產生器｜人生卡關，翻書看看</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;500&family=Noto+Sans+TC:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #f5f4f0;
    --card-bg: #ffffff;
    --text: #222222;
    --text-sub: #888888;
    --border: #e0e0e0;
    --accent: #1a1a1a;
    --tag-bg: #ffffff;
  }

  body {
    font-family: 'Noto Sans TC', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    color: var(--text);
  }

  /* HEADER */
  header {
    padding: 36px 40px 28px;
    border-bottom: 1px solid var(--border);
    background: #fff;
    display: flex;
    align-items: baseline;
    gap: 20px;
  }
  header h1 {
    font-family: 'Noto Serif TC', serif;
    font-size: 20px;
    font-weight: 400;
    letter-spacing: 5px;
    color: #333;
  }
  header span {
    font-size: 11px;
    letter-spacing: 3px;
    color: #bbb;
  }

  /* MAIN LAYOUT */
  .main {
    display: flex;
    gap: 0;
    min-height: calc(100vh - 89px);
  }

  /* LEFT PANEL */
  .panel {
    width: 320px;
    flex-shrink: 0;
    background: #fff;
    border-right: 1px solid var(--border);
    padding: 28px 24px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .field-label {
    font-size: 10px;
    letter-spacing: 3px;
    color: #aaa;
    margin-bottom: 8px;
    display: block;
    text-transform: uppercase;
  }

  .input-wrap input[type="text"] {
    width: 100%;
    padding: 12px 14px;
    border: 1px solid var(--border);
    background: var(--bg);
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 14px;
    color: var(--text);
    outline: none;
    letter-spacing: 1px;
    transition: border-color 0.2s;
  }
  .input-wrap input:focus { border-color: #999; background: #fff; }

  .gen-btn {
    width: 100%;
    padding: 14px;
    background: var(--accent);
    color: #fff;
    border: none;
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 12px;
    letter-spacing: 5px;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
  }
  .gen-btn:hover { background: #333; }
  .gen-btn:active { transform: scale(0.99); }

  .divider {
    border: none;
    border-top: 1px solid var(--border);
  }

  /* CONTROLS */
  .ctrl-row { display: flex; gap: 8px; }
  .ctrl-row .ctrl-group { flex: 1; }

  .toggle-btns { display: flex; gap: 5px; }
  .tbn {
    flex: 1;
    padding: 8px 4px;
    border: 1px solid var(--border);
    background: var(--bg);
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 11px;
    letter-spacing: 1px;
    color: #888;
    cursor: pointer;
    transition: all 0.15s;
  }
  .tbn.on { background: var(--accent); color: #fff; border-color: var(--accent); }

  .source-input {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid var(--border);
    background: var(--bg);
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 12px;
    color: #666;
    outline: none;
    letter-spacing: 2px;
  }
  .source-input:focus { border-color: #999; background: #fff; }

  /* QUICK TAGS */
  .quick-tags { display: flex; flex-wrap: wrap; gap: 6px; }
  .qtag {
    padding: 5px 10px;
    background: var(--bg);
    border: 1px solid var(--border);
    font-size: 11px;
    color: #666;
    cursor: pointer;
    letter-spacing: 1px;
    transition: all 0.15s;
  }
  .qtag:hover { background: #eee; border-color: #bbb; }

  .dl-all-btn {
    width: 100%;
    padding: 13px;
    background: #fff;
    color: #444;
    border: 1px solid var(--border);
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 11px;
    letter-spacing: 3px;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: auto;
  }
  .dl-all-btn:hover { background: var(--bg); border-color: #aaa; }

  /* RIGHT: CARDS GRID */
  .cards-area {
    flex: 1;
    padding: 32px;
    display: flex;
    flex-direction: column;
    gap: 24px;
  }

  .cards-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 16px;
  }

  .card-slot {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .card-num {
    font-size: 10px;
    letter-spacing: 3px;
    color: #ccc;
    text-align: center;
  }

  .canvas-wrap {
    position: relative;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .canvas-wrap:hover { transform: translateY(-3px); box-shadow: 0 12px 32px rgba(0,0,0,0.10); }

  .canvas-wrap canvas {
    display: block;
    width: 100%;
    height: auto;
    box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    background: #fff;
  }

  .card-actions {
    display: flex;
    gap: 6px;
  }

  .edit-btn, .dl-btn {
    flex: 1;
    padding: 7px 4px;
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 10px;
    letter-spacing: 1px;
    cursor: pointer;
    border: 1px solid var(--border);
    transition: all 0.15s;
  }
  .edit-btn { background: #fff; color: #666; }
  .edit-btn:hover { background: var(--bg); }
  .dl-btn { background: var(--accent); color: #fff; border-color: var(--accent); }
  .dl-btn:hover { background: #333; }

  /* EDIT MODAL */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
  }
  .modal-overlay.show { opacity: 1; pointer-events: all; }

  .modal {
    background: #fff;
    width: 360px;
    padding: 28px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.15);
  }
  .modal h3 {
    font-family: 'Noto Serif TC', serif;
    font-size: 15px;
    font-weight: 400;
    letter-spacing: 3px;
    color: #444;
  }
  .modal textarea {
    width: 100%;
    padding: 12px 14px;
    border: 1px solid var(--border);
    font-family: 'Noto Serif TC', serif;
    font-size: 15px;
    color: #333;
    line-height: 1.8;
    resize: vertical;
    min-height: 100px;
    outline: none;
    letter-spacing: 1px;
    background: var(--bg);
  }
  .modal textarea:focus { border-color: #999; background: #fff; }
  .modal-btns { display: flex; gap: 8px; }
  .modal-save {
    flex: 1;
    padding: 12px;
    background: var(--accent);
    color: #fff;
    border: none;
    font-size: 12px;
    letter-spacing: 3px;
    cursor: pointer;
  }
  .modal-cancel {
    padding: 12px 16px;
    background: #fff;
    color: #666;
    border: 1px solid var(--border);
    font-size: 12px;
    letter-spacing: 2px;
    cursor: pointer;
  }

  /* EMPTY STATE */
  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 400px;
    gap: 16px;
    color: #ccc;
  }
  .empty-state .big { font-family: 'Noto Serif TC', serif; font-size: 48px; }
  .empty-state p { font-size: 13px; letter-spacing: 3px; }

  /* LIGHTBOX */
  .lightbox {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 200;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s;
    padding: 24px;
  }
  .lightbox.show { opacity: 1; pointer-events: all; }

  .lightbox-inner {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    max-height: 90vh;
  }

  .lightbox-inner img {
    max-height: 78vh;
    max-width: 90vw;
    width: auto;
    display: block;
    box-shadow: 0 24px 80px rgba(0,0,0,0.5);
  }

  .lightbox-actions {
    display: flex;
    gap: 10px;
  }

  .lb-dl-btn {
    padding: 12px 28px;
    background: #fff;
    color: #222;
    border: none;
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 12px;
    letter-spacing: 3px;
    cursor: pointer;
    transition: background 0.15s;
  }
  .lb-dl-btn:hover { background: #eee; }

  .lb-edit-btn {
    padding: 12px 28px;
    background: transparent;
    color: #fff;
    border: 1px solid rgba(255,255,255,0.4);
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 12px;
    letter-spacing: 3px;
    cursor: pointer;
    transition: border-color 0.15s;
  }
  .lb-edit-btn:hover { border-color: #fff; }

  .lb-close {
    position: absolute;
    top: -16px;
    right: -16px;
    width: 36px;
    height: 36px;
    background: rgba(255,255,255,0.15);
    border: none;
    color: #fff;
    font-size: 18px;
    cursor: pointer;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s;
  }
  .lb-close:hover { background: rgba(255,255,255,0.3); }

  .lb-nav {
    position: fixed;
    top: 50%;
    transform: translateY(-50%);
    width: 44px;
    height: 44px;
    background: rgba(255,255,255,0.15);
    border: none;
    color: #fff;
    font-size: 20px;
    cursor: pointer;
    border-radius: 50%;
    transition: background 0.15s;
    z-index: 201;
  }
  .lb-nav:hover { background: rgba(255,255,255,0.3); }
  .lb-prev { left: 20px; }
  .lb-next { right: 20px; }

  .lb-counter {
    font-size: 11px;
    letter-spacing: 3px;
    color: rgba(255,255,255,0.5);
  }

  .canvas-wrap { cursor: zoom-in; }

  @media (max-width: 900px) {
    .main { flex-direction: column; }
    .panel { width: 100%; border-right: none; border-bottom: 1px solid var(--border); }
    .cards-grid { grid-template-columns: repeat(2, 1fr); }
    header { padding: 20px; }
    .cards-area { padding: 20px; }
  }
</style>
</head>
<body>

<header>
  <h1>金句卡片產生器</h1>
  <span>人生卡關，翻書看看</span>
</header>

<div class="main">
  <!-- LEFT PANEL -->
  <div class="panel">

    <div class="input-wrap">
      <span class="field-label">輸入關鍵字或主題</span>
      <input type="text" id="kw" placeholder="例：不被選擇、感情、卡關…" />
    </div>

    <button class="gen-btn" onclick="generateAll()">生成五張金句卡片</button>

    <hr class="divider">

    <div>
      <span class="field-label">署名</span>
      <input type="text" class="source-input" id="srcInput" value="人生卡關，翻書看看" oninput="redrawAll()">
    </div>

    <div class="ctrl-row">
      <div class="ctrl-group">
        <span class="field-label">文字大小</span>
        <div class="toggle-btns" id="szBtns">
          <button class="tbn" onclick="setSz('s',this)">小</button>
          <button class="tbn on" onclick="setSz('m',this)">中</button>
          <button class="tbn" onclick="setSz('l',this)">大</button>
        </div>
      </div>
      <div class="ctrl-group">
        <span class="field-label">對齊方式</span>
        <div class="toggle-btns" id="alBtns">
          <button class="tbn on" onclick="setAl('left',this)">左</button>
          <button class="tbn" onclick="setAl('center',this)">中</button>
        </div>
      </div>
    </div>

    <hr class="divider">

    <div>
      <span class="field-label">快速主題</span>
      <div class="quick-tags">
        <span class="qtag" onclick="setKwGen('不被選擇')">不被選擇</span>
        <span class="qtag" onclick="setKwGen('自信')">自信</span>
        <span class="qtag" onclick="setKwGen('迷失')">迷失</span>
        <span class="qtag" onclick="setKwGen('感情')">感情</span>
        <span class="qtag" onclick="setKwGen('卡關')">卡關</span>
        <span class="qtag" onclick="setKwGen('失敗')">失敗</span>
        <span class="qtag" onclick="setKwGen('職涯')">職涯</span>
        <span class="qtag" onclick="setKwGen('家人')">家人</span>
        <span class="qtag" onclick="setKwGen('愧疚')">愧疚</span>
        <span class="qtag" onclick="setKwGen('等待')">等待</span>
        <span class="qtag" onclick="setKwGen('強者')">強者</span>
        <span class="qtag" onclick="setKwGen('饒恕')">饒恕</span>
        <span class="qtag" onclick="setKwGen('疾病')">疾病</span>
        <span class="qtag" onclick="setKwGen('財務')">財務</span>
        <span class="qtag" onclick="setKwGen('兩性')">兩性關係</span>
        <span class="qtag" onclick="setKwGen('婚姻')">婚姻</span>
        <span class="qtag" onclick="setKwGen('職場')">工作職涯</span>
        <span class="qtag" onclick="setKwGen('人生')">人生定位</span>
        <span class="qtag" onclick="setKwGen('呼召')">呼召</span>
      </div>
    </div>

    <button class="dl-all-btn" onclick="downloadAll()">全部下載（五張）</button>

  </div>

  <!-- CARDS AREA -->
  <div class="cards-area">
    <div class="cards-grid" id="cardsGrid">
      <!-- empty state -->
      <div class="empty-state" style="grid-column:1/-1">
        <div class="big">翻</div>
        <p>輸入關鍵字，生成五張金句卡片</p>
      </div>
    </div>
  </div>
</div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox" onclick="closeLightbox(event)">
  <button class="lb-nav lb-prev" onclick="lbNav(-1);event.stopPropagation()">&#8249;</button>
  <button class="lb-nav lb-next" onclick="lbNav(1);event.stopPropagation()">&#8250;</button>
  <div class="lightbox-inner" onclick="event.stopPropagation()">
    <button class="lb-close" onclick="closeLightboxDirect()">&#215;</button>
    <img id="lbImg" src="" alt="">
    <div class="lb-counter" id="lbCounter">1 / 5</div>
    <div class="lightbox-actions">
      <button class="lb-dl-btn" onclick="lbDownload()">下載這張</button>
      <button class="lb-edit-btn" onclick="lbEdit()">編輯文字</button>
    </div>
  </div>
</div>

<!-- EDIT MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <h3>編輯金句</h3>
    <textarea id="modalText" rows="4"></textarea>
    <div class="modal-btns">
      <button class="modal-save" onclick="saveModal()">確認</button>
      <button class="modal-cancel" onclick="closeModalDirect()">取消</button>
    </div>
  </div>
</div>

<script>

var sz = 'm';
var al = 'left';
var quotes = ['','','','',''];
var editIdx = -1;

var fontSizes = { s: 40, m: 52, l: 66 };
var OUT_W = 1080, OUT_H = 1350;

// ─── QUOTE BANK ──────────────────────────────────────
// 每筆格式：{ text, ref }
var allQuotes = [
  // 不被選擇 [0-4]
  { text: '神看人不像人看人。\n人看外表，神看內心。', ref: '撒母耳記上 16:7' },

  { text: '大衛連父親都忘了叫他，\n但神沒有忘記他。', ref: '撒母耳記上 16:11-12' },

  { text: '你往哪裡去，\n我也往那裡去。', ref: '路得記 1:16' },
  { text: '迷失不是終點，\n回頭永遠來得及。', ref: '路加福音 15:20' },

  { text: '他手所辦的事，\n耶和華都賜福給他。', ref: '創世記 39:3' },

// ─── CONTROLS ────────────────────────────────────────
function setSz(v, el) {
  sz = v;
  document.querySelectorAll('#szBtns .tbn').forEach(function(b){ b.classList.remove('on'); });
  el.classList.add('on');
  redrawAll();
}
function setAl(v, el) {
  al = v;
  document.querySelectorAll('#alBtns .tbn').forEach(function(b){ b.classList.remove('on'); });
  el.classList.add('on');
  redrawAll();
}
function setKwGen(kw) {
  document.getElementById('kw').value = kw;
  generateAll();
}

// ─── GENERATE ────────────────────────────────────────
function generateAll() {
  var kw = document.getElementById('kw').value.trim();
  var pool = null;

  if (kw) {
    var keys = Object.keys(keywordMap);
    for (var i = 0; i < keys.length; i++) {
      if (kw.indexOf(keys[i]) >= 0 || keys[i].indexOf(kw) >= 0) {
        pool = keywordMap[keys[i]].map(function(idx){ return allQuotes[idx]; });
        break;
      }
    }
  }

  if (!pool) {
    var shuffled = allQuotes.slice().sort(function(){ return Math.random()-0.5; });
    pool = shuffled.slice(0, 5);
  } else {
    pool = pool.slice().sort(function(){ return Math.random()-0.5; });
  }

  quotes = pool.slice(0, 5);
  renderGrid();
}

// ─── RENDER GRID ─────────────────────────────────────
function renderGrid() {
  var grid = document.getElementById('cardsGrid');
  grid.innerHTML = '';

  for (var i = 0; i < 5; i++) {
    var slot = document.createElement('div');
    slot.className = 'card-slot';
    slot.innerHTML =
      '<div class="card-num">' + (i+1) + ' / 5</div>' +
      '<div class="canvas-wrap" id="wrap' + i + '" onclick="openLightbox(' + i + ')">' +
        '<canvas id="cv' + i + '" width="1080" height="1350"></canvas>' +
      '</div>' +
      '<div class="card-actions">' +
        '<button class="edit-btn" onclick="openModal(' + i + ')">編輯</button>' +
        '<button class="dl-btn" onclick="downloadOne(' + i + ')">下載</button>' +
      '</div>';
    grid.appendChild(slot);
    paintCard(i);
  }
}

function redrawAll() {
  if (quotes[0] === '') return;
  for (var i = 0; i < 5; i++) paintCard(i);
}

// ─── PAINT ───────────────────────────────────────────
function paintCard(idx) {
  var cv = document.getElementById('cv' + idx);
  if (!cv) return;
  var src = document.getElementById('srcInput').value || '';
  var q = quotes[idx] || { text: '', ref: '' };
  paint(cv, OUT_W, OUT_H, q.text, q.ref, src);
  var lb = document.getElementById('lightbox');
  if (lb.classList.contains('show') && lbIdx === idx) updateLightbox();
}

function paint(cv, w, h, text, ref, src) {
  var ctx = cv.getContext('2d');
  cv.width = w; cv.height = h;
  var scale = w / 1080;
  var f = Math.round(fontSizes[sz] * scale);
  var pad = Math.round(w * 0.12);

  // background
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, w, h);

  // border
  ctx.strokeStyle = '#e0e0e0';
  ctx.lineWidth = Math.max(0.5, scale);
  ctx.strokeRect(0.5, 0.5, w-1, h-1);

  // quote text — centered in upper 65% of card
  ctx.fillStyle = '#333333';
  ctx.font = '400 ' + f + 'px "Noto Serif TC", serif';
  ctx.textBaseline = 'alphabetic';

  var lines = text.split('\n');
  var lh = f * 2.0;
  var totalH = (lines.length - 1) * lh + f;
  var zone = h * 0.65;
  var startY = (zone - totalH) / 2 + f;

  for (var i = 0; i < lines.length; i++) {
    var y = startY + i * lh;
    if (al === 'left') {
      ctx.textAlign = 'left';
      ctx.fillText(lines[i], pad, y);
    } else {
      ctx.textAlign = 'center';
      ctx.fillText(lines[i], w/2, y);
    }
  }

  // ref — below quote
  if (ref) {
    var rs = Math.round(f * 0.38);
    ctx.font = '300 ' + rs + 'px "Noto Sans TC", sans-serif';
    ctx.fillStyle = '#aaaaaa';
    var refY = startY + lines.length * lh + Math.round(f * 0.6);
    if (al === 'left') {
      ctx.textAlign = 'left';
      ctx.fillText('— ' + ref, pad, refY);
    } else {
      ctx.textAlign = 'center';
      ctx.fillText('— ' + ref, w/2, refY);
    }
  }

  // source — bottom right
  var ss = Math.round(f * 0.44);
  ctx.font = '300 ' + ss + 'px "Noto Sans TC", sans-serif';
  ctx.fillStyle = '#aaaaaa';
  ctx.textAlign = 'right';
  ctx.textBaseline = 'alphabetic';
  ctx.fillText(src, w - pad * 0.6, h - pad * 0.5);
}

// ─── DOWNLOAD ────────────────────────────────────────
function downloadOne(idx) {
  var off = document.createElement('canvas');
  var src = document.getElementById('srcInput').value || '';
  var q = quotes[idx] || { text: '', ref: '' };
  paint(off, OUT_W, OUT_H, q.text, q.ref, src);
  var a = document.createElement('a');
  var slug = q.text.replace(/\n/g,'').substring(0,10);
  a.download = '金句_' + (idx+1) + '_' + slug + '.png';
  a.href = off.toDataURL('image/png');
  a.click();
}

function downloadAll() {
  if (!quotes[0]) { alert('請先生成金句卡片'); return; }
  var src = document.getElementById('srcInput').value || '';
  for (var i = 0; i < 5; i++) {
    (function(idx){
      setTimeout(function(){
        var off = document.createElement('canvas');
        var q = quotes[idx] || { text: '', ref: '' };
        paint(off, OUT_W, OUT_H, q.text, q.ref, src);
        var a = document.createElement('a');
        var slug = q.text.replace(/\n/g,'').substring(0,10);
        a.download = '金句_' + (idx+1) + '_' + slug + '.png';
        a.href = off.toDataURL('image/png');
        a.click();
      }, idx * 400);
    })(i);
  }
}

  editIdx = idx;
  document.getElementById('modalText').value = quotes[idx] ? quotes[idx].text : '';
  document.getElementById('modalOverlay').classList.add('show');
}

function saveModal() {
  if (quotes[editIdx]) {
    quotes[editIdx].text = document.getElementById('modalText').value;
  }
  paintCard(editIdx);
  closeModalDirect();
}

// ─── LIGHTBOX ────────────────────────────────────────
var lbIdx = 0;

function openLightbox(idx) {
  lbIdx = idx;
  updateLightbox();
  document.getElementById('lightbox').classList.add('show');
}

function updateLightbox() {
  var cv = document.getElementById('cv' + lbIdx);
  if (!cv) return;
  document.getElementById('lbImg').src = cv.toDataURL('image/png');
  document.getElementById('lbCounter').textContent = (lbIdx + 1) + ' / 5';
}

function lbNav(dir) {
  lbIdx = (lbIdx + dir + 5) % 5;
  updateLightbox();
}

function closeLightbox(e) {
  document.getElementById('lightbox').classList.remove('show');
}
function closeLightboxDirect() {
  document.getElementById('lightbox').classList.remove('show');
}

function lbDownload() { downloadOne(lbIdx); }
function lbEdit() {
  closeLightboxDirect();
  openModal(lbIdx);
}

// keyboard nav
document.addEventListener('keydown', function(e) {
  var lb = document.getElementById('lightbox');
  if (!lb.classList.contains('show')) return;
  if (e.key === 'ArrowLeft') lbNav(-1);
  if (e.key === 'ArrowRight') lbNav(1);
  if (e.key === 'Escape') closeLightboxDirect();
});

// ─── FONTS READY ─────────────────────────────────────
document.fonts.ready.then(function(){ redrawAll(); });
</script>
</body>
</html>
